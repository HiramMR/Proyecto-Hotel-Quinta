<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Quinta Dalam</title>
    <link rel="icon" href="img/favicon.png">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/formulario.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Zilla+Slab:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

</head>
<body>
    <div id="nav-bar">
        <div id="logo">
            <img src="img/favicon.png" alt="Logo" height="50">
            <h1>Hotel Quinta Dalam</h1>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="habitaciones.html" class="active">Habitaciones</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="login.html">Cuenta</a>
        </nav>
    </div>
    <main>
        <div class="tarjeta" style="margin-top: 100px;">
            <h2>Registrar Habitación</h2>
            <form>
                <label for="nombre">Nombre de la habitación:</label>
                <input type="text" id="nombre" name="nombre" required>
                <label for="precio">Precio por noche:</label>
                <input type="number" id="precio" name="precio" required>
                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" name="descripcion" rows="4" required></textarea>
                <label for="imagen">Imagen:</label>
                <input type="file" id="imagen" name="imagen" accept="image/*">
                <br>
                <input type="submit" value="Guardar Habitación">
            </form>
        </div>
    </main>
    <footer>
        <div id="copyright">
            <p>© 2026 Hotel Quinta Dalam. Todos los derechos reservados.</p>
        </div>
        <div id="badges">
            <p>
                <a href="https://jigsaw.w3.org/css-validator/check/referer">
                    <img style="border:0;width:88px;height:31px"
                        src="https://jigsaw.w3.org/css-validator/images/vcss"
                        alt="¡CSS Válido!" />
                </a>
            </p>
            <p>
                <a href="https://validator.w3.org/#uri=referer">
                    <img style="border:0;width:88px;height:31px"
                        src="https://www.w3.org/Icons/valid-html401"
                        alt="¡HTML Válido!" />
                </a>
            </p>
        </div>
    </footer>
</body>
</html>
